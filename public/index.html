<!DOCTYPE html>
<html>

<head>

    
    
    <title>
        ESPN World Cup Dashboard
    </title>

    <link
        rel="stylesheet"
        href="/css/index.css"
    >
<link rel="icon" type="image/png" href="/assets/Emundial.png">

<link rel="apple-touch-icon" href="/assets/Emundial.png">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>

<body>

<div class="page">

    <div class="hero">

        <div class="top-logo">
            <img
                src="/assets/ESPN_MUNDIAL_H_R.png"
                alt="ESPN Mundial 2026"
            >
        </div>
        
        <h1>
            FIFA WORLD CUP 2026
        </h1>

        <h2 id="tournamentDay">
            Loading...
        </h2>

        <p id="stage"></p>

        <p id="latestDate"></p>

        <div
            class="matches"
            id="matchesContainer"
        ></div>

    </div>

    <div class="kpi-grid secondary">

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC ENGAGEMENT
            </div>
            <div
                class="kpi-value"
                id="totalEngagement"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC VIDEO VIEWS
            </div>
            <div
                class="kpi-value"
                id="totalVideoViews"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC PAGE VIEWS
            </div>
            <div
                class="kpi-value"
                id="totalPageViews"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                AVG WC UNIQUE VISITORS
            </div>
            <div
                class="kpi-value"
                id="avgUniqueVisitors"
            ></div>
        </div>

    </div>

    <div class="kpi-grid">

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC POSTS
            </div>
            <div
                class="kpi-value"
                id="totalPosts"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC WATCH TIME
            </div>
            <div
                class="kpi-value"
                id="totalWatchTime"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC CONTENT STARTS
            </div>
            <div
                class="kpi-value"
                id="totalContentStarts"
            ></div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">
                TOTAL WC LIVE VIEWS
            </div>
            <div
                class="kpi-value"
                id="totalLiveViews"
            ></div>
        </div>

    </div>

    <div class="dashboard-link">

        <a href="/dashboard.html">

            OPEN ANALYTICS DASHBOARD →

        </a>

    </div>

</div>

<script src="/js/index.js"></script>

</body>
</html>
